<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HM Cabello — Notre Collection Complète</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Boxicons CDN for premium icons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="products-page">

<header id="siteHeader">
  <a href="index.html" class="brand">HM <span>Cabello</span></a>
  
  <div class="header-actions">
    <button id="themeToggle" class="theme-toggle" aria-label="Changer de thème">
      <i class="bx bx-moon"></i>
    </button>
    <button class="burger" id="burger" aria-label="Ouvrir le menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
  
  <nav id="nav">
    <ul>
      <li><a href="index.html" class="nav-link">Accueil</a></li>
      <li><a href="index.html#about" class="nav-link">À propos</a></li>
      <li><a href="index.html#products" class="nav-link">Produits</a></li>
      <li><a href="index.html#contact" class="nav-link">Contact</a></li>
    </ul>
  </nav>
</header>
<div class="nav-overlay" id="navOverlay"></div>

<section class="products-hero">
  <div class="hero-bg mini-hero-bg"></div>
  <div class="hero-content">
    <span class="eyebrow">Collection Complète</span>
    <h1>Nos Créations & Accessoires</h1>
    <div class="signature-line mini-signature-line"></div>
  </div>
</section>

<section class="catalog-section">
  <div class="catalog-controls">
    <!-- Search Bar -->
    <div class="search-box">
      <i class="bx bx-search search-icon"></i>
      <input type="text" id="searchInput" placeholder="Rechercher un produit...">
    </div>
    
    <!-- Filter Buttons -->
    <div class="filter-tabs">
      <button class="filter-btn active" data-filter="all">Tout voir</button>
      <button class="filter-btn" data-filter="Perruque">Perruques</button>
      <button class="filter-btn" data-filter="Collier">Colliers</button>
      <button class="filter-btn" data-filter="Bracelet">Bracelets</button>
      <button class="filter-btn" data-filter="Bague">Bagues</button>
    </div>
  </div>

  <!-- Catalog Grid -->
  <div class="grid" id="catalogProductGrid">
    <div class="loading">Chargement du catalogue...</div>
  </div>
  
  <div class="back-home-container">
    <a href="index.html" class="btn"><i class="bx bx-left-arrow-alt" style="vertical-align: middle; margin-right: 8px;"></i>Retour à l'accueil</a>
  </div>
</section>

<footer>
  &copy; <span class="date"></span> HM <span>Cabello</span> — Tous droits réservés
</footer>

<script src="script.js"></script>
</body>
</html>
